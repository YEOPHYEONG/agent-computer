<svg width="1600" height="620" viewBox="0 0 1600 620" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Agent Computer workflow</title>
  <desc id="desc">Workflow diagram from natural request through router, agent chain, QA, and durable project outputs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1020"/>
      <stop offset="1" stop-color="#101827"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
    <style>
      .title { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 42px; font-weight: 850; fill: #F8FAFC; letter-spacing: 0; }
      .sub { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 21px; font-weight: 600; fill: #B6C3D5; letter-spacing: 0; }
      .label { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 23px; font-weight: 800; fill: #F8FAFC; letter-spacing: 0; }
      .small { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 17px; font-weight: 600; fill: #C9D4E5; letter-spacing: 0; }
      .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; font-size: 16px; font-weight: 650; fill: #B8F1D2; letter-spacing: 0; }
    </style>
  </defs>
  <rect width="1600" height="620" fill="url(#bg)"/>
  <text x="80" y="88" class="title">How work moves through Agent Computer</text>
  <text x="80" y="126" class="sub">Natural language in. Routed agent chain. Durable files out.</text>

  <g filter="url(#shadow)">
    <rect x="80" y="226" width="220" height="146" rx="24" fill="#172033" stroke="#2E3A54"/>
    <text x="118" y="276" class="label">Request</text>
    <text x="118" y="314" class="small">normal language</text>
    <text x="118" y="344" class="mono">"make a PPT"</text>
  </g>

  <path d="M324 299H384" stroke="#8BD3FF" stroke-width="6" stroke-linecap="round"/>
  <path d="M370 281L388 299L370 317" stroke="#8BD3FF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#shadow)">
    <rect x="410" y="202" width="252" height="194" rx="24" fill="#132235" stroke="#315A82"/>
    <text x="450" y="252" class="label">workspace-router</text>
    <text x="450" y="292" class="small">chooses app or chain</text>
    <text x="450" y="326" class="mono">new project?</text>
    <text x="450" y="354" class="mono">reuse allowed?</text>
  </g>

  <path d="M686 299H746" stroke="#A6F3C5" stroke-width="6" stroke-linecap="round"/>
  <path d="M732 281L750 299L732 317" stroke="#A6F3C5" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#shadow)">
    <rect x="772" y="178" width="326" height="242" rx="24" fill="#101826" stroke="#3A7C5B"/>
    <text x="812" y="228" class="label">Agent chain</text>
    <g transform="translate(812 258)">
      <rect width="224" height="40" rx="12" fill="#1E3A2E"/>
      <text x="18" y="26" class="mono">deep-dive-researcher</text>
      <rect y="52" width="160" height="40" rx="12" fill="#1E3A2E"/>
      <text x="18" y="78" class="mono">report-writer</text>
      <rect y="104" width="138" height="40" rx="12" fill="#1E3A2E"/>
      <text x="18" y="130" class="mono">ppt-builder</text>
    </g>
  </g>

  <path d="M1122 299H1182" stroke="#FFD166" stroke-width="6" stroke-linecap="round"/>
  <path d="M1168 281L1186 299L1168 317" stroke="#FFD166" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#shadow)">
    <rect x="1208" y="202" width="312" height="194" rx="24" fill="#10261F" stroke="#3A7C5B"/>
    <text x="1248" y="252" class="label">Project outputs</text>
    <text x="1248" y="292" class="mono">workspace/projects/</text>
    <text x="1248" y="326" class="mono">reports · decks · QA</text>
    <text x="1248" y="354" class="small">inspect, reuse, continue</text>
  </g>

  <g transform="translate(500 482)">
    <rect width="600" height="64" rx="18" fill="#151D2C" stroke="#2E3A54"/>
    <text x="32" y="41" class="small">Approval gates protect external sending, publishing, deletion, payments, account changes, and host-app actions.</text>
  </g>
</svg>
