<svg width="1600" height="720" viewBox="0 0 1600 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Before and after Agent Computer</title>
  <desc id="desc">Comparison between chat-only agent work and Agent Computer project-based workflows.</desc>
  <defs>
    <linearGradient id="left" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#1A2030"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="right" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#10281F"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.24"/>
    </filter>
    <style>
      .head { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 44px; font-weight: 850; fill: #F8FAFC; letter-spacing: 0; }
      .sub { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 23px; font-weight: 600; fill: #B6C3D5; letter-spacing: 0; }
      .label { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 22px; font-weight: 800; fill: #F8FAFC; letter-spacing: 0; }
      .small { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 18px; font-weight: 600; fill: #C9D4E5; letter-spacing: 0; }
      .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; font-size: 17px; font-weight: 650; fill: #B8F1D2; letter-spacing: 0; }
    </style>
  </defs>
  <rect width="1600" height="720" fill="#0B1020"/>
  <text x="80" y="92" class="head">Before / After</text>
  <text x="80" y="132" class="sub">The difference is not whether agents can answer. It is whether work becomes durable, inspectable, and reusable.</text>

  <g filter="url(#shadow)">
    <rect x="80" y="184" width="670" height="452" rx="30" fill="url(#left)" stroke="#2D374B"/>
    <text x="122" y="244" class="head">Chat thread</text>
    <text x="122" y="282" class="sub">one-off answers, scattered context</text>

    <g transform="translate(122 332)">
      <rect width="250" height="52" rx="14" fill="#252D3F"/>
      <text x="22" y="34" class="small">Can you make a deck?</text>
      <rect x="80" y="78" width="334" height="52" rx="14" fill="#151E30" stroke="#3A455D"/>
      <text x="102" y="112" class="small">Here is a draft outline...</text>
      <rect y="156" width="288" height="52" rx="14" fill="#252D3F"/>
      <text x="22" y="190" class="small">Where are the files?</text>
      <path d="M18 258H496" stroke="#47546C" stroke-width="3" stroke-linecap="round" stroke-dasharray="10 12"/>
      <text x="18" y="304" class="small">Lost context</text>
      <text x="216" y="304" class="small">Manual re-prompting</text>
      <text x="434" y="304" class="small">Weak QA</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="850" y="184" width="670" height="452" rx="30" fill="url(#right)" stroke="#315B49"/>
    <text x="892" y="244" class="head">Agent Computer</text>
    <text x="892" y="282" class="sub">agent apps, project folders, reusable outputs</text>

    <g transform="translate(892 326)">
      <rect width="246" height="64" rx="16" fill="#132235" stroke="#315A82"/>
      <text x="24" y="39" class="mono">computer/agents</text>
      <rect x="278" width="246" height="64" rx="16" fill="#132235" stroke="#315A82"/>
      <text x="302" y="39" class="mono">computer/tools</text>
      <path d="M248 32H276" stroke="#8BD3FF" stroke-width="4" stroke-linecap="round"/>

      <rect y="112" width="524" height="210" rx="20" fill="#10261F" stroke="#3A7C5B"/>
      <text x="28" y="152" class="label">workspace/projects/{project-slug}/</text>
      <rect x="28" y="176" width="142" height="46" rx="12" fill="#1E3A2E"/>
      <text x="52" y="206" class="mono">research</text>
      <rect x="190" y="176" width="126" height="46" rx="12" fill="#1E3A2E"/>
      <text x="218" y="206" class="mono">reports</text>
      <rect x="336" y="176" width="160" height="46" rx="12" fill="#1E3A2E"/>
      <text x="360" y="206" class="mono">presentations</text>
      <rect x="28" y="244" width="104" height="46" rx="12" fill="#1E3A2E"/>
      <text x="58" y="274" class="mono">qa</text>
      <rect x="152" y="244" width="128" height="46" rx="12" fill="#1E3A2E"/>
      <text x="184" y="274" class="mono">assets</text>
      <rect x="300" y="244" width="118" height="46" rx="12" fill="#1E3A2E"/>
      <text x="334" y="274" class="mono">tasks</text>
    </g>
  </g>
</svg>
