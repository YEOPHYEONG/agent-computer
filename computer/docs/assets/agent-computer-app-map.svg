<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Agent Computer app map</title>
  <desc id="desc">A map of the installed Agent Computer apps grouped into system, work, and personal agents.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1020"/>
      <stop offset="0.55" stop-color="#111827"/>
      <stop offset="1" stop-color="#1A1730"/>
    </linearGradient>
    <filter id="shadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <style>
      .title { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 56px; font-weight: 850; letter-spacing: 0; fill: #F8FAFC; }
      .sub { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 24px; font-weight: 600; letter-spacing: 0; fill: #B6C3D5; }
      .group { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 28px; font-weight: 850; letter-spacing: 0; fill: #F8FAFC; }
      .app { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; font-size: 18px; font-weight: 650; letter-spacing: 0; fill: #E6EEF8; }
      .small { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 17px; font-weight: 650; letter-spacing: 0; fill: #B6C3D5; }
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <path d="M1512 130C1342 54 1189 95 1030 153C786 242 586 95 361 105C193 113 78 193 0 295V0H1600V186C1574 163 1546 145 1512 130Z" fill="#8BD3FF" opacity="0.05"/>
  <path d="M0 751C137 667 296 680 474 733C692 798 872 829 1059 738C1251 645 1423 658 1600 748V900H0V751Z" fill="#A6F3C5" opacity="0.055"/>

  <text x="90" y="105" class="title">Installed agent apps</text>
  <text x="92" y="148" class="sub">Agent Computer routes natural-language requests to small, inspectable apps and chains.</text>

  <g filter="url(#shadow)">
    <rect x="90" y="218" width="416" height="506" rx="30" fill="#121B2C" stroke="#30405D"/>
    <rect x="90" y="218" width="416" height="76" rx="30" fill="#17233A"/>
    <text x="130" y="267" class="group">System</text>
    <text x="130" y="333" class="app">workspace-router</text>
    <text x="130" y="378" class="app">agent-builder</text>
    <text x="130" y="423" class="app">document-ingestor</text>
    <text x="130" y="468" class="app">file-organizer</text>
    <text x="130" y="513" class="app">memory-curator</text>
    <text x="130" y="558" class="app">qa-verifier</text>
    <rect x="130" y="612" width="300" height="58" rx="16" fill="#0F1726" stroke="#2E3A54"/>
    <text x="158" y="648" class="small">Route, build, ingest, organize, verify.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="592" y="190" width="542" height="562" rx="34" fill="#101A26" stroke="#315B49"/>
    <rect x="592" y="190" width="542" height="76" rx="34" fill="#112A21"/>
    <text x="632" y="239" class="group">Work</text>
    <g transform="translate(632 304)">
      <rect width="210" height="48" rx="14" fill="#173429" stroke="#3A7C5B"/>
      <text x="22" y="31" class="app">quick-researcher</text>
      <rect x="244" width="220" height="48" rx="14" fill="#173429" stroke="#3A7C5B"/>
      <text x="266" y="31" class="app">deep-dive-researcher</text>
      <rect y="70" width="210" height="48" rx="14" fill="#173429" stroke="#3A7C5B"/>
      <text x="22" y="101" class="app">planning-partner</text>
      <rect x="244" y="70" width="220" height="48" rx="14" fill="#173429" stroke="#3A7C5B"/>
      <text x="266" y="101" class="app">report-writer</text>
      <rect y="140" width="210" height="48" rx="14" fill="#2C253A" stroke="#6B5BA8"/>
      <text x="22" y="171" class="app">ppt-builder</text>
      <rect x="244" y="140" width="220" height="48" rx="14" fill="#2C253A" stroke="#6B5BA8"/>
      <text x="266" y="171" class="app">image-deck-maker</text>
      <rect y="210" width="210" height="48" rx="14" fill="#2C253A" stroke="#6B5BA8"/>
      <text x="22" y="241" class="app">visual-asset-maker</text>
      <rect x="244" y="210" width="220" height="48" rx="14" fill="#2B2518" stroke="#9F7E35"/>
      <text x="266" y="241" class="app">web-builder</text>
      <rect y="280" width="210" height="48" rx="14" fill="#132A37" stroke="#315A82"/>
      <text x="22" y="311" class="app">email-operator</text>
      <rect x="244" y="280" width="220" height="48" rx="14" fill="#132A37" stroke="#315A82"/>
      <text x="266" y="311" class="app">instagram-growth</text>
    </g>
    <rect x="632" y="674" width="464" height="46" rx="14" fill="#0F1726" stroke="#2E3A54"/>
    <text x="660" y="704" class="small">Research, write, build decks, create assets, make web reports.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1220" y="218" width="290" height="506" rx="30" fill="#17172A" stroke="#40365F"/>
    <rect x="1220" y="218" width="290" height="76" rx="30" fill="#221D3B"/>
    <text x="1260" y="267" class="group">Personal</text>
    <rect x="1260" y="333" width="202" height="54" rx="16" fill="#2C253A" stroke="#6B5BA8"/>
    <text x="1282" y="367" class="app">friend-counselor</text>
    <text x="1260" y="444" class="small">A reflective agent for</text>
    <text x="1260" y="476" class="small">thinking, decisions, and</text>
    <text x="1260" y="508" class="small">supportive conversation.</text>
  </g>

  <text x="90" y="816" class="sub">A request can use one app or a chain: deep-dive-researcher → report-writer → ppt-builder → qa-verifier.</text>
</svg>
